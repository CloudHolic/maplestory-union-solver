version: "2"

run:
  timeout: 3m
  go: "1.26.2"

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - revive

  settings:
    revive:
      rules:
        - name: exported
        - name: error-return
        - name: var-naming
    gosec:
      excludes:
        - G304

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
